<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — NasscomPrep</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .lb-list {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: .9rem 1.1rem;
      transition: border-color .2s;
    }

    .lb-row:hover {
      border-color: var(--border-hi);
    }

    .lb-row-me {
      border-color: var(--indigo) !important;
      background: rgba(91, 106, 240, .06);
    }

    .lb-info {
      flex: 1;
      min-width: 0;
    }

    .lb-name {
      font-weight: 500;
      font-size: .9rem;
      color: var(--white);
      display: block;
    }

    .lb-meta {
      font-size: .75rem;
      color: var(--text3);
    }

    .lb-score {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      min-width: 56px;
      text-align: right;
    }

    .top3 .lb-row:nth-child(1) {
      background: rgba(245, 200, 66, .06);
      border-color: rgba(245, 200, 66, .3);
    }

    .top3 .lb-row:nth-child(2) {
      background: rgba(176, 184, 200, .05);
      border-color: rgba(176, 184, 200, .2);
    }

    .top3 .lb-row:nth-child(3) {
      background: rgba(251, 146, 60, .05);
      border-color: rgba(251, 146, 60, .2);
    }

    .page-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    /* refresh btn */
    #btn-refresh {
      position: absolute;
      top: 0;
      right: 0;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">📚 NasscomPrep</a>
      <div class="nav-links">
        <a href="quiz.html" class="nav-link">Quiz</a>
        <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
        <a href="history.html" class="nav-link">My History</a>
      </div>
      <div class="nav-right" id="nav-user-area" style="display:none; align-items:center; gap:.6rem">
        <img class="nav-avatar" id="nav-avatar" src="" alt="">
        <button class="btn btn-ghost btn-sm" id="nav-logout">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="page-inner">
    <div class="section-head fu" style="position:relative">
      <div>
        <h2>🏆 Global Leaderboard</h2>
        <p style="font-size:.85rem; margin-top:.2rem">Top scores across all sessions. Updated live.</p>
      </div>
      <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ Refresh</button>
    </div>

    <div id="lb-container" class="fu2"></div>

    <div style="margin-top:2rem; text-align:center">
      <a href="quiz.html" class="btn btn-primary">Take a Quiz →</a>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { onAuth, logOut } from "./js/firebase.js";
    import { mountLeaderboard } from "./js/leaderboard.js";

    function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500); }

    let uid = null;

    onAuth(user => {
      uid = user?.uid || null;
      const area = document.getElementById("nav-user-area");
      if (user) {
        area.style.display = "flex";
        document.getElementById("nav-avatar").src = user.photoURL || "";
      }
      load();
    });

    document.getElementById("nav-logout")?.addEventListener("click", async () => {
      await logOut(); toast("Signed out.");
    });

    async function load() {
      await mountLeaderboard(document.getElementById("lb-container"), uid);
    }

    document.getElementById("btn-refresh").addEventListener("click", () => {
      toast("Refreshing…");
      load();
    });
  </script>
</body>

</html>
